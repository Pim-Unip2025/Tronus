<!DOCTYPE html>
<html lang="pt-br">

<head>
  <link rel="stylesheet" href="sidebar.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <title>Trilha - TRONUS</title>

  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: url('img/fundo_reinos.jpg') center center / cover no-repeat fixed;
      font-family: 'Crimson Text', serif;
      color: #f0e6c8;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10, 5, 0, 0.6);
      z-index: 0;
    }

    /* TOPO */
    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 40px;
      background: rgba(20, 10, 0, 0.75);
      border-bottom: 2px solid rgba(212,175,55,0.4);
      backdrop-filter: blur(6px);
    }

    .back-btn {
      background: none;
      border: 1px solid rgba(212,175,55,0.4);
      color: #d4af37;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: rgba(212,175,55,0.1);
    }

    .topbar-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: #f0e6c8;
      letter-spacing: 3px;
    }

    .topbar-sub {
      font-size: 13px;
      color: #a89060;
      font-style: italic;
      margin-left: auto;
    }

    /* TRILHA */
    .trilha-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px 80px;
      gap: 0;
    }

    /* ITEM DA TRILHA */
    .fase-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      margin-bottom: 0;
    }

    /* LINHA CONECTORA entre fases */
    .fase-item:not(:last-child)::after {
      content: "";
      width: 4px;
      height: 60px;
      background: linear-gradient(180deg, rgba(212,175,55,0.5), rgba(212,175,55,0.1));
      border-radius: 4px;
    }

    /* CÍRCULO DA FASE */
    .fase-circulo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 3px solid #d4af37;
      background: radial-gradient(circle at 30% 30%, rgba(212,175,55,0.3), rgba(20,10,0,0.9));
      box-shadow: 0 4px 20px rgba(212,175,55,0.2);
      position: relative;
    }

    .fase-circulo:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(212,175,55,0.4);
    }

    .fase-circulo.bloqueada {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: rgba(100,100,100,0.5);
      background: radial-gradient(circle at 30% 30%, rgba(50,50,50,0.3), rgba(20,10,0,0.9));
      box-shadow: none;
      filter: grayscale(1);
    }

    .fase-circulo.bloqueada:hover {
      transform: none;
      box-shadow: none;
    }

    .fase-circulo.completa {
      border-color: #d4af37;
      background: radial-gradient(circle at 30% 30%, rgba(212,175,55,0.5), rgba(20,10,0,0.9));
    }

    .fase-numero {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: #f0e6c8;
    }

    .fase-lock-icon {
      font-size: 24px;
      color: rgba(150,150,150,0.6);
    }

    /* ESTRELAS ABAIXO DO CÍRCULO */
    .fase-estrelas {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .fase-estrelas i {
      font-size: 18px;
      color: rgba(212,175,55,0.25);
    }

    .fase-estrelas i.ativa {
      color: #d4af37;
    }

    .fase-label {
      font-size: 13px;
      color: #a89060;
      font-style: italic;
      margin-bottom: 30px;
    }

    /* MODAL DE CONFIRMAÇÃO */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.ativo {
      display: flex;
    }

    .modal {
      background: rgba(20, 10, 0, 0.95);
      border: 2px solid rgba(212,175,55,0.5);
      border-radius: 16px;
      padding: 36px;
      width: 340px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .modal h2 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: #f0e6c8;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .modal p {
      font-size: 15px;
      color: #a89060;
      margin-bottom: 24px;
      font-style: italic;
    }

    .modal-estrelas {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .modal-estrelas i {
      font-size: 36px;
      color: rgba(212,175,55,0.2);
      cursor: pointer;
      transition: 0.2s;
    }

    .modal-estrelas i.ativa,
    .modal-estrelas i:hover {
      color: #d4af37;
      transform: scale(1.2);
    }

    .modal-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn-confirmar {
      background: linear-gradient(135deg, #d4af37, #f5d020);
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      color: #1a0a00;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-confirmar:hover {
      transform: scale(1.05);
    }

    .btn-cancelar {
      background: transparent;
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 8px;
      padding: 10px 24px;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: #a89060;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-cancelar:hover {
      border-color: #d4af37;
      color: #d4af37;
    }

  </style>
</head>

<script src="js/sidebar.js"></script>

<body>

  <!-- TOPO -->
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='reinos.html'">
      ← Voltar
    </button>
    <span class="topbar-title" id="reinoNome">—</span>
    <span class="topbar-sub" id="reinoProgresso">0 / 9 ⭐</span>
  </div>

  <!-- TRILHA -->
  <div class="trilha-wrap" id="trilhaWrap"></div>

  <!-- MODAL para registrar estrelas -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalFaseNome">Fase 1</h2>
      <p>Quantas estrelas você conquistou nesta fase?</p>
      <div class="modal-estrelas" id="modalEstrelas">
        <i class='bx bxs-star' data-val="1"></i>
        <i class='bx bxs-star' data-val="2"></i>
        <i class='bx bxs-star' data-val="3"></i>
      </div>
      <div class="modal-btns">
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        <button class="btn-confirmar" onclick="confirmarEstrelas()">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/theme.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script src="js/database.js"></script>
  <script>

    let faseAtual = null;
    let estrelasEscolhidas = 0;
    let personagemId = null;

    initDatabase().then(() => {

      const reino = JSON.parse(sessionStorage.getItem("reinoSelecionado")) 
           || JSON.parse(localStorage.getItem("reinoSelecionado"));

      personagemId = sessionStorage.getItem("personagemId") 
            || localStorage.getItem("personagemId");

      if (!reino || !personagemId) {
        window.location.href = "reinos.html";
        return;
      }

      document.getElementById("reinoNome").innerText = reino.nome;

      const totalEstrelas = reino.fases.reduce((s, f) => s + f.estrelas, 0);
      document.getElementById("reinoProgresso").innerText = totalEstrelas + " / " + (reino.fases.length * 3) + " ⭐";

      const wrap = document.getElementById("trilhaWrap");

      reino.fases.forEach((fase, index) => {

        // Fase desbloqueada se for a primeira ou a anterior tiver pelo menos 1 estrela
        const desbloqueada = index === 0 || reino.fases[index - 1].estrelas > 0;
        const completa     = fase.estrelas === 3;

        const item = document.createElement("div");
        item.classList.add("fase-item");

        // Círculo
        const circulo = document.createElement("div");
        circulo.classList.add("fase-circulo");
        if (!desbloqueada) circulo.classList.add("bloqueada");
        if (completa) circulo.classList.add("completa");

        if (desbloqueada) {
          circulo.innerHTML = `<span class="fase-numero">${index + 1}</span>`;
          circulo.onclick = () => abrirModal(fase);
        } else {
          circulo.innerHTML = `<i class='bx bxs-lock fase-lock-icon'></i>`;
        }

        // Estrelas
        let estrelasHtml = '<div class="fase-estrelas">';
        for (let i = 0; i < 3; i++) {
          estrelasHtml += `<i class='bx bxs-star ${i < fase.estrelas ? "ativa" : ""}'></i>`;
        }
        estrelasHtml += '</div>';

        const label = document.createElement("div");
        label.classList.add("fase-label");
        label.innerText = fase.nome;

        item.appendChild(circulo);
        item.innerHTML += estrelasHtml;
        item.appendChild(label);

        wrap.appendChild(item);
      });

    });

    // -----------------------------------------------
    // MODAL
    // -----------------------------------------------
    function abrirModal(fase) {
      faseAtual = fase;
      estrelasEscolhidas = fase.estrelas || 0;

      document.getElementById("modalFaseNome").innerText = fase.nome;
      atualizarEstrelasModal(estrelasEscolhidas);

      document.getElementById("modalOverlay").classList.add("ativo");
    }

    function fecharModal() {
      document.getElementById("modalOverlay").classList.remove("ativo");
      faseAtual = null;
      estrelasEscolhidas = 0;
    }

    function atualizarEstrelasModal(val) {
      document.querySelectorAll(".modal-estrelas i").forEach((star, i) => {
        star.classList.toggle("ativa", i < val);
      });
    }

    // Clique nas estrelas do modal
    document.querySelectorAll(".modal-estrelas i").forEach(star => {
      star.addEventListener("click", () => {
        estrelasEscolhidas = parseInt(star.dataset.val);
        atualizarEstrelasModal(estrelasEscolhidas);
      });
    });

    function confirmarEstrelas() {
      if (estrelasEscolhidas === 0) {
        alert("Selecione pelo menos 1 estrela.");
        return;
      }

      atualizarProgresso(personagemId, faseAtual.id, estrelasEscolhidas);

      fecharModal();

      // Recarrega a tela com dados atualizados
      const reino = JSON.parse(sessionStorage.getItem("reinoSelecionado"));
      const faseIndex = reino.fases.findIndex(f => f.id === faseAtual.id);
      reino.fases[faseIndex].estrelas = estrelasEscolhidas;
      sessionStorage.setItem("reinoSelecionado", JSON.stringify(reino));

      location.reload();
    }

  </script>

</body>
</html>
