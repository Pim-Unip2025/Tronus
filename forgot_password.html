<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Redefinir Senha - TRONUS</title>
</head>

<body>

<div id="sky"></div>

<main class="container">

  <!-- PASSO 1: informar celular -->
  <div id="step1">

    <img src="img/logo.png" class="logo">

    <div class="input-box">
      <input id="celularInput" placeholder="Número de celular" type="tel">
      <i class='bx bx-phone'></i>
    </div>

    <button class="login" onclick="enviarCodigo()">Enviar código</button>

    <div class="register-link">
      <p><a href="index.html">Voltar ao login</a></p>
    </div>

  </div>

  <!-- PASSO 2: inserir código simulado -->
  <div id="step2" style="display:none;">

    <img src="img/logo.png" class="logo">

    <p style="color:#fff; text-align:center; margin-bottom:20px;">
      Um código foi enviado para o número informado.<br>
      <strong id="codigoExibido" style="color:gold;"></strong>
    </p>

    <div class="input-box">
      <input id="codigoInput" placeholder="Digite o código" type="text">
      <i class='bx bx-key'></i>
    </div>

    <button class="login" onclick="verificarCodigo()">Verificar código</button>

  </div>

  <!-- PASSO 3: nova senha -->
  <div id="step3" style="display:none;">

    <img src="img/logo.png" class="logo">

    <div class="input-box">
      <input id="novaSenha" placeholder="Nova senha" type="password">
      <i class='bx bx-lock-alt'></i>
    </div>

    <div class="input-box">
      <input id="confirmarSenha" placeholder="Confirmar nova senha" type="password">
      <i class='bx bx-lock-alt'></i>
    </div>

    <button class="login" onclick="salvarNovaSenha()">Salvar senha</button>

  </div>

</main>

<script src="js/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="js/database.js"></script>
<script>

  // Código gerado aleatoriamente e usuário encontrado ficam aqui
  let codigoGerado = null;
  let usuarioEncontrado = null;

  initDatabase().then(() => {
    console.log("Banco pronto na tela de redefinição.");
  });

  // PASSO 1 — Verifica o celular e "envia" o código
  function enviarCodigo() {

    const celular = document.getElementById("celularInput").value;

    if (!celular) {
      alert("Informe o número de celular.");
      return;
    }

    usuarioEncontrado = buscarUsuarioPorCelular(celular);

    if (!usuarioEncontrado) {
      alert("Nenhuma conta encontrada com esse número.");
      return;
    }

    // Gera um código de 6 dígitos aleatório
    codigoGerado = Math.floor(100000 + Math.random() * 900000).toString();

    // Exibe o código na tela (simulação — em produção seria enviado por SMS)
    document.getElementById("codigoExibido").innerText = "Código: " + codigoGerado;

    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  // PASSO 2 — Verifica se o código está correto
  function verificarCodigo() {

    const digitado = document.getElementById("codigoInput").value;

    if (digitado !== codigoGerado) {
      alert("Código incorreto. Tente novamente.");
      return;
    }

    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
  }

  // PASSO 3 — Salva a nova senha
  function salvarNovaSenha() {

    const novaSenha     = document.getElementById("novaSenha").value;
    const confirmar     = document.getElementById("confirmarSenha").value;

    if (!novaSenha || !confirmar) {
      alert("Preencha os dois campos.");
      return;
    }

    if (novaSenha !== confirmar) {
      alert("As senhas não coincidem.");
      return;
    }

    redefinirSenha(usuarioEncontrado.id, novaSenha);

    alert("Senha redefinida com sucesso!");
    window.location.href = "index.html";
  }

</script>

</body>
</html>
