<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>TRONUS</title>

</head>

<body>

<div id="sky"></div>

<main class="container">

<form id="loginForm">

<img src="img/logo.png" class="logo">

<div class="input-box">
<input id="loginIdentificador" placeholder="Usuário ou Email" type="text">
<i class='bx bx-user'></i>
</div>

<div class="input-box">
<input id="loginPassword" placeholder="Senha" type="password">
<i class='bx bx-lock-alt'></i>
</div>

<div class="remember">
    <label><input type="checkbox" id="rememberMe"> Lembrar senha</label>
</div>

<div class="register-link" style="margin-bottom:10px;">
  <p><a href="forgot_password.html">Esqueci minha senha</a></p>
</div>

<button type="submit" class="login">Login</button>

<div class="register-link">
<p>Não tem uma conta? <a href="register.html">Registrar</a></p>
</div>

</form>

</main>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="database.js"></script>
<script src="login_db.js"></script>

</body>
</html>
